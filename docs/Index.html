<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swirly Loop Animation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0a0f, #000);
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let time = 0;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  const layers = 6;

  for (let j = 0; j < layers; j++) {
    ctx.beginPath();
    for (let i = 0; i < 200; i++) {
      const t = i / 200 * Math.PI * 2;
      
      const radius = 150 + Math.sin(t * 3 + time + j) * 50;
      const angle = t + time * 0.5 + j * 0.5;

      const x = cx + Math.cos(angle) * radius * (1 + Math.sin(time + j) * 0.2);
      const y = cy + Math.sin(angle) * radius * (1 + Math.cos(time + j) * 0.2);

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    const hue = (time * 40 + j * 60) % 360;
    ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  time += 0.02;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
